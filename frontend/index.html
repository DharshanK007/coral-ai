<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OceanIQ Platform</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ocean: { navy: '#0a1628', teal: '#0d4f6b', coral: '#ff6b6b', seafoam: '#2dd4bf', gold: '#fbbf24', dark: '#050b14' }
            },
            animation: { 'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite' },
            keyframes: {
              'pulse-glow': {
                '0%, 100%': { opacity: '1', filter: 'drop-shadow(0 0 10px rgba(45, 212, 191, 0.5))' },
                '50%': { opacity: '.7', filter: 'drop-shadow(0 0 20px rgba(45, 212, 191, 0.8))' },
              }
            }
          }
        }
      }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/style.css" />
</head>
<body class="bg-ocean-navy text-white min-h-screen w-full overflow-x-hidden m-0 p-0 font-sans relative">
    
    <!-- Background Animated Bubbles -->
    <div id="bubble-container" class="fixed inset-0 pointer-events-none z-0 overflow-hidden"></div>
    
    <!-- Custom Crab Cursor -->
    <div id="crab-cursor" class="fixed pointer-events-none z-[9999] transform -translate-x-1/2 -translate-y-1/2 drop-shadow-lg transition-transform duration-75">
        <svg id="crab-svg" width="40" height="40" viewBox="0 0 100 100" class="crab-icon">
            <path d="M50 30 C 70 30, 85 45, 85 65 C 85 80, 70 90, 50 90 C 30 90, 15 80, 15 65 C 15 45, 30 30, 50 30 Z" fill="#ff6b6b"/>
            <!-- Eyes -->
            <circle cx="40" cy="20" r="5" fill="#ff6b6b"/><circle cx="40" cy="20" r="2" fill="white"/>
            <circle cx="60" cy="20" r="5" fill="#ff6b6b"/><circle cx="60" cy="20" r="2" fill="white"/>
            <!-- Legs -->
            <path d="M15 65 Q 5 75 10 90 M85 65 Q 95 75 90 90 M20 50 Q 5 50 5 65 M80 50 Q 95 50 95 65" stroke="#ff6b6b" stroke-width="4" fill="none"/>
            <!-- Claws (Animated) -->
            <g id="left-claw" class="claw origin-bottom-right">
                <path d="M25 40 Q 10 20 20 10 Q 30 20 25 40 Z" fill="#ff4757"/>
            </g>
            <g id="right-claw" class="claw origin-bottom-left">
                <path d="M75 40 Q 90 20 80 10 Q 70 20 75 40 Z" fill="#ff4757"/>
            </g>
        </svg>
    </div>

    <!-- React Mount Point -->
    <div id="root" class="relative z-10"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Cursor Logic -->
    <script>
        const cursor = document.getElementById('crab-cursor');
        const svg = document.getElementById('crab-svg');
        let mouseX = 0, mouseY = 0, lastX = 0;
        
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';
            
            // Flip crab horizontally based on movement direction
            if (mouseX > lastX + 2) { svg.style.transform = 'scaleX(-1)'; }
            else if (mouseX < lastX - 2) { svg.style.transform = 'scaleX(1)'; }
            lastX = mouseX;
        });

        document.addEventListener('mousedown', () => { svg.classList.add('snapping'); });
        document.addEventListener('mouseup', () => { setTimeout(() => svg.classList.remove('snapping'), 150); });
        
        // Hide default cursor completely
        document.body.style.cursor = 'none';
        document.querySelectorAll('*').forEach(el => el.style.cursor = 'none');
        
        // Generative Background Bubbles
        const container = document.getElementById('bubble-container');
        for(let i=0; i<30; i++) {
            let b = document.createElement('div');
            b.className = 'absolute rounded-full bg-ocean-seafoam opacity-10 animate-blob';
            b.style.width = Math.random() * 100 + 20 + 'px';
            b.style.height = b.style.width;
            b.style.left = Math.random() * 100 + 'vw';
            b.style.top = Math.random() * 100 + 'vh';
            b.style.animationDuration = (Math.random() * 10 + 5) + 's';
            b.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(b);
        }
    </script>
</body>
</html>
