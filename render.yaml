services:
  # Monolithic App: FastAPI Backend + React Frontend
  - type: web
    name: coraldarwin-cloud
    env: docker
    dockerfilePath: ./backend.Dockerfile
    plan: starter # Starter plan is recommended for data processing (RAM)
    region: ohio
    disk:
      name: coral-data
      mountPath: /app/data
      sizeGB: 10 # 10GB persistent storage for Parquet files
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: DEPLOYMENT_MODE
        value: cloud
      # Add API keys here securely in the Render dashboard later
      - key: NOAA_ERDDAP_BASE_URL
        value: https://coastwatch.pfeg.noaa.gov/erddap
