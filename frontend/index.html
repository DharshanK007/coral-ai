<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>CORAL AI Platform</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Google Fonts: Bioluminescence Theme -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ocean: { navy: '#0a1628', teal: '#0d4f6b', coral: '#ff6b6b', seafoam: '#2dd4bf', gold: '#fbbf24', dark: '#050b14' }
            },
            animation: { 'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite' },
            keyframes: {
              'pulse-glow': {
                '0%, 100%': { opacity: '1', filter: 'drop-shadow(0 0 10px rgba(45, 212, 191, 0.5))' },
                '50%': { opacity: '.7', filter: 'drop-shadow(0 0 20px rgba(45, 212, 191, 0.8))' },
              }
            }
          }
        }
      }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/style.css?v=4" />

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- React Is -->
    <script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
    
    <!-- Babel (Compiles JSX in browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Recharts Dependencies -->
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-ocean-navy text-white min-h-screen w-full overflow-x-hidden m-0 p-0 font-sans relative">
    
    <!-- Background Animated Bubbles -->
    <div id="bubble-container" class="fixed inset-0 pointer-events-none z-0 overflow-hidden"></div>
    

    <!-- React Mount Point -->
    <div id="root" class="relative z-10"></div>
    
    <!-- Cache-busted script loader: forces browser to always fetch latest app.js and data.js -->
    <script>
        // Each page load gets a fresh timestamp so the browser NEVER serves a cached copy
        var _v = new Date().getTime();
        console.log("Loading CORAL AI scripts with cache-buster v=" + _v);

        // Inject data.js with cache-buster
        var dataScript = document.createElement('script');
        dataScript.src = '/data.js?v=' + _v;
        document.head.appendChild(dataScript);

        // After data.js loads, inject app.js (Babel type) with cache-buster
        dataScript.onload = function() {
            var appScript = document.createElement('script');
            appScript.type = 'text/babel';
            appScript.dataset.type = 'module';
            appScript.src = '/app.js?v=' + _v;
            document.body.appendChild(appScript);
            console.log("CORAL AI scripts injected — cache-buster: v=" + _v);
        };
    </script>

    <!-- Generative Background Bubbles -->
    <script>
        const container = document.getElementById('bubble-container');
        for(let i=0; i<30; i++) {
            let b = document.createElement('div');
            b.className = 'absolute rounded-full bg-ocean-seafoam opacity-10 animate-blob';
            b.style.width = Math.random() * 100 + 20 + 'px';
            b.style.height = b.style.width;
            b.style.left = Math.random() * 100 + 'vw';
            b.style.top = Math.random() * 100 + 'vh';
            b.style.animationDuration = (Math.random() * 10 + 5) + 's';
            b.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(b);
        }
    </script>

    <!-- ═══ DECORATIVE: Bioluminescent Particles & Ambient Effects ═══ -->
    <script>
    (function() {
        // Bioluminescent particle field
        var pc = document.createElement('div');
        pc.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden';
        for (var i = 0; i < 50; i++) {
            var p = document.createElement('div');
            var size = Math.random() * 4 + 2;
            var x = Math.random() * 100;
            var y = Math.random() * 100;
            var delay = Math.random() * 12;
            var duration = Math.random() * 14 + 8;
            var opacity = Math.random() * 0.18 + 0.05;
            var color = Math.random() > 0.3
                ? 'rgba(0,245,196,' + opacity + ')'
                : 'rgba(0,180,255,' + opacity + ')';
            p.style.cssText = 'position:absolute;width:' + size + 'px;height:' + size + 'px;'
                + 'border-radius:50%;background:' + color + ';left:' + x + '%;top:' + y + '%;'
                + 'box-shadow:0 0 ' + (size * 3) + 'px ' + color + ';'
                + 'animation:particleFloat ' + duration + 's ease-in-out ' + delay + 's infinite alternate;';
            pc.appendChild(p);
        }
        document.body.appendChild(pc);

        // Ambient blobs
        ['1','2'].forEach(function(i) {
            var b = document.createElement('div');
            b.className = 'bio-ambient-blob bio-ambient-blob-' + i;
            document.body.insertBefore(b, document.body.firstChild);
        });

        // Bioluminescent tide
        var tide = document.createElement('div');
        tide.className = 'bio-ocean-tide';
        document.body.appendChild(tide);
    })();
    </script>
</body>
</html>
